<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Offline · Apka Bill</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --border: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --red: #ef4444;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      overflow: hidden;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .icon-container {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      position: relative;
    }

    .icon {
      color: var(--red);
      width: 40px;
      height: 40px;
    }

    /* CSS Wi-Fi Off shape */
    .wifi-off {
      width: 40px;
      height: 40px;
      position: relative;
    }
    .wifi-off::before, .wifi-off::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 4px solid var(--red);
      border-bottom-color: transparent;
      border-left-color: transparent;
      border-right-color: transparent;
      left: 50%;
      transform: translateX(-50%);
    }
    .wifi-off::before {
      width: 32px;
      height: 32px;
      top: 4px;
    }
    .wifi-off::after {
      width: 16px;
      height: 16px;
      top: 12px;
    }
    .wifi-dot {
      width: 6px;
      height: 6px;
      background-color: var(--red);
      border-radius: 50%;
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
    }
    .slash-line {
      position: absolute;
      width: 44px;
      height: 4px;
      background-color: var(--red);
      top: 18px;
      left: -2px;
      transform: rotate(-45deg);
      border-radius: 2px;
      border: 1.5px solid var(--card-bg);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.025em;
    }

    p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s, transform 0.1s;
      outline: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover {
      background-color: var(--primary-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--red);
      margin-bottom: 20px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--red);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="status-badge">
      <div class="status-dot"></div>
      Offline Mode Active
    </div>
    <div class="icon-container">
      <div class="wifi-off">
        <div class="wifi-dot"></div>
        <div class="slash-line"></div>
      </div>
    </div>
    <h1>Connection Lost</h1>
    <p>Orion POS has lost connection to the backend server. Critical checkout operations and database writes are paused. You will be automatically redirected when online.</p>
    <button class="btn" onclick="retryConnection()">
      Retry Connection
    </button>
  </div>

  <script>
    function retryConnection() {
      const btn = document.querySelector('.btn');
      btn.innerText = 'Connecting...';
      btn.disabled = true;
      setTimeout(() => {
        if (navigator.onLine) {
          window.location.reload();
        } else {
          btn.innerText = 'Retry Connection';
          btn.disabled = false;
        }
      }, 1000);
    }

    // Automatically reload when network comes back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
